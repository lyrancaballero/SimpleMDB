<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Edit Actor-Movie Link • Simple Movie Database</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles/main.css" />
    <script type="module" src="/scripts/actors-movies/edit.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Edit Actor-Movie Link</h1>
      <nav>
        <ul>
          <li><a href="/" class="btn">Home</a></li>
          <li><a href="/actors-movies/index.html" class="btn">All Links</a></li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <div id="status" class="status">Loading...</div>
      <form id="am-form" class="grid">
        <div class="field">
          <label for="actorId">Actor ID</label>
          <input id="actorId" name="actorId" type="number" required />
        </div>
        <div class="field">
          <label for="movieId">Movie ID</label>
          <input id="movieId" name="movieId" type="number" required />
        </div>
        <div class="form-actions">
          <button class="btn primary" type="submit">Save Changes</button>
          <a class="btn" href="/actors-movies/index.html">Cancel</a>
        </div>
      </form>
    </main>
  </body>
</html>
